name: API Review (LangChain Agent)

on:
  pull_request:
    paths:
      - 'src/**/*.java'
      - 'src/**/*.py'
      - '**/openapi.yaml'
      - '**/openapi.yml'

jobs:
  api-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Install dependencies
        run: |
          pip install -r api-review-agent/requirements.txt
          npm install -g @stoplight/spectral-cli
      
      - name: Generate OpenAPI for main branch
        run: |
          git stash
          git checkout ${{ github.base_ref }}
          mvn springdoc-openapi:generate -q
          cp target/openapi.yaml main-openapi.yaml || echo "No OpenAPI generated"
          git checkout -
          git stash pop || true
      
      - name: Generate OpenAPI for PR branch
        run: |
          mvn springdoc-openapi:generate -q
          cp target/openapi.yaml pr-openapi.yaml || echo "No OpenAPI generated"
      
      - name: Run API Review Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAIN_OPENAPI_PATH: "main-openapi.yaml"
          PR_OPENAPI_PATH: "pr-openapi.yaml"
        run: |
          cd api-review-agent
          python src/main.py
